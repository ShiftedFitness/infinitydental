<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 32" role="img" aria-label="Imperial Iran flag — Lion and Sun (Shir-o-Khorshid)">
  <!-- Tricolour: green / white / red -->
  <rect width="56" height="32" fill="#FFFFFF"/>
  <rect width="56" height="10.67" y="0"     fill="#239F40"/>
  <rect width="56" height="10.67" y="21.33" fill="#DA0000"/>

  <!-- Lion and Sun emblem, centred on the white stripe -->
  <g transform="translate(28 16)">
    <!-- Sun rays — 16 evenly distributed alternating long/short -->
    <g stroke="#D4A12A" stroke-linecap="round" stroke-width="0.55" fill="none">
      <g>
        <line x1="0"     y1="-7.4" x2="0"     y2="-4.6"/>
        <line x1="2.83"  y1="-6.83" x2="1.76" y2="-4.25"/>
        <line x1="5.23"  y1="-5.23" x2="3.25" y2="-3.25"/>
        <line x1="6.83"  y1="-2.83" x2="4.25" y2="-1.76"/>
        <line x1="7.4"   y1="0"     x2="4.6"  y2="0"/>
        <line x1="6.83"  y1="2.83"  x2="4.25" y2="1.76"/>
        <line x1="5.23"  y1="5.23"  x2="3.25" y2="3.25"/>
        <line x1="2.83"  y1="6.83"  x2="1.76" y2="4.25"/>
        <line x1="0"     y1="7.4"   x2="0"    y2="4.6"/>
        <line x1="-2.83" y1="6.83"  x2="-1.76" y2="4.25"/>
        <line x1="-5.23" y1="5.23"  x2="-3.25" y2="3.25"/>
        <line x1="-6.83" y1="2.83"  x2="-4.25" y2="1.76"/>
        <line x1="-7.4"  y1="0"     x2="-4.6"  y2="0"/>
        <line x1="-6.83" y1="-2.83" x2="-4.25" y2="-1.76"/>
        <line x1="-5.23" y1="-5.23" x2="-3.25" y2="-3.25"/>
        <line x1="-2.83" y1="-6.83" x2="-1.76" y2="-4.25"/>
      </g>
    </g>

    <!-- Sun disc -->
    <circle r="4.4" fill="#F0BB1F" stroke="#D4A12A" stroke-width="0.3"/>

    <!-- Stylised lion silhouette walking left-to-right, holding a sword -->
    <g fill="#8B4513">
      <!-- body -->
      <path d="M -2.6 0.6 Q -2.6 -0.4 -1.6 -0.7 L 1.6 -0.7 Q 2.6 -0.4 2.6 0.6 L 2.6 1.6 Q 2.4 2 2.0 2.1 L -2.0 2.1 Q -2.4 2 -2.6 1.6 Z"/>
      <!-- mane around head -->
      <circle cx="-2.4" cy="-0.4" r="1.5" fill="#7A3D11"/>
      <!-- head -->
      <circle cx="-2.4" cy="-0.4" r="0.95" fill="#8B4513"/>
      <!-- ear -->
      <circle cx="-3.1" cy="-1.1" r="0.3" fill="#7A3D11"/>
      <!-- snout -->
      <ellipse cx="-3.4" cy="0" rx="0.5" ry="0.35" fill="#8B4513"/>
      <!-- legs -->
      <rect x="-1.6" y="1.8" width="0.5" height="1.4" rx="0.15"/>
      <rect x="-0.6" y="1.8" width="0.5" height="1.4" rx="0.15"/>
      <rect x="0.4"  y="1.8" width="0.5" height="1.4" rx="0.15"/>
      <rect x="1.4"  y="1.8" width="0.5" height="1.4" rx="0.15"/>
      <!-- tail flicked up and curling -->
      <path d="M 2.5 0.8 Q 3.6 -0.2 3.4 -1.3 Q 3.7 -1.7 4.0 -1.5" stroke="#7A3D11" stroke-width="0.45" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Sword raised by the lion's front paw -->
    <g>
      <rect x="0.85" y="-2.7" width="0.35" height="2.9" fill="#C9CCD2"/>
      <rect x="0.55" y="-0.05" width="0.95" height="0.35" fill="#A88528"/>
      <rect x="0.95" y="0.30" width="0.15" height="0.6" fill="#7A6131"/>
      <polygon points="1.025,-3.0 0.85,-2.7 1.20,-2.7" fill="#C9CCD2"/>
    </g>
  </g>
</svg>
