# Netlify deployment for infinitydentalmarbella.com
#
# This is a static HTML site — no build step required.
# Just publishes the repo root as-is.

[build]
  publish = "."

# Long cache for assets (logo, photos, hero image, flag SVG) — content-addressed via filename.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages must always revalidate so content updates land immediately on next visit.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Useful security + performance headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-Frame-Options = "SAMEORIGIN"

# Pretty URL: /emergency → emergency-landing.html (paid-search short URL for ad campaigns).
[[redirects]]
  from = "/emergency"
  to = "/emergency-landing.html"
  status = 200

# Pretty URL: /legal → legal.html
[[redirects]]
  from = "/legal"
  to = "/legal.html"
  status = 200
